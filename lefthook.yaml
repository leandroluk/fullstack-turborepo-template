# Configurations for Lefthook for Git Hooks automation
# Documentation: https://lefthook.dev/configuration

# Hook executed before commit
commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

# Hook executed before commit
pre-commit:
  commands:
    # executes the build only for packages in the packages/ directory
    build:
      run: pnpm turbo build --filter=./packages/*

    # applies type checking to the project
    typecheck:
      run: pnpm turbo typecheck

    # executes the lint only for packages affected by changes in the stage
    lint:
      run: pnpm turbo lint --affected

# Hook executed before push
pre-push:
  commands:
    # executes the build only for packages affected by changes in the stage
    build:
      run: pnpm turbo build --affected

    # executes the tests only for packages affected by changes
    test:
      run: pnpm turbo test --affected
