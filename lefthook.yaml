# Configurações do Lefthook para automação de Git Hooks
# Documentation: https://lefthook.dev/configuration

# Hook executado antes do commit
commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

# Hook executado antes do commit
pre-commit:
  commands:
    # executa o build apenas nos pacotes no diretório packages/
    build:
      run: pnpm turbo build --filter=./packages/*

    # aplica verificação de tipo ao projeto
    typecheck:
      run: pnpm turbo typecheck

    # executa o lint apenas nos pacotes afetados por mudanças no stage
    lint:
      run: pnpm turbo lint --affected

# Hook executado antes do push
pre-push:
  commands:
    # executa o build apenas nos pacotes afetados por mudanças no stage
    build:
      run: pnpm turbo build --affected

    # executa os testes apenas nos pacotes afetados por mudanças
    test:
      run: pnpm turbo test --affected
