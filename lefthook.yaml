# Configuration of Lefthook for Git Hooks automation
# Documentation: https://lefthook.dev/configuration

# Hook executed before commit
commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}

# Hook executed before commit
pre-commit:
  jobs:
    # applies type checking to the project
    - name: typecheck
      run: pnpm turbo typecheck

    # executes the build only in packages affected by staged changes
    - name: build
      run: pnpm turbo build --affected

    # executes the lint only in packages affected by staged changes
    - name: lint
      run: pnpm turbo lint --affected

# Hook executed before push
pre-push:
  jobs:
    # executes the tests only in packages affected by changes
    - name: test
      run: pnpm turbo test --affected
