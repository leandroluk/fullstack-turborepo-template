# Pulumi.baremetal.yaml
config:
  # ── Provider ───────────────────────────────────────────────────────────────
  k8s:provider: baremetal

  # ── Domain ────────────────────────────────────────────────────────────────
  # Use nip.io with your node's IP, or a real domain with your own DNS
  k8s:baseDomain: "192.168.1.100.nip.io"

  # ── MetalLB ───────────────────────────────────────────────────────────────
  # Range of unused IPs on your L2 network segment
  k8s:metallbAddressPool: "192.168.1.200-192.168.1.210"

  # ── Storage class ─────────────────────────────────────────────────────────
  # Common options: "local-path" (k3s default), "longhorn", "nfs-client"
  k8s:storageClass: "local-path"

  # ── Images ────────────────────────────────────────────────────────────────
  # Point to your own registry (local, ghcr.io, private, etc.)
  k8s:apiImage: "registry.yourdomain.com/api:latest"
  k8s:webImage: "registry.yourdomain.com/web:latest"
  k8s:docImage: "registry.yourdomain.com/doc:latest"

  # ── Replicas ──────────────────────────────────────────────────────────────
  k8s:apiReplicas: "2"
  k8s:webReplicas: "2"
  k8s:docReplicas: "1"

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  k8s:postgresUser: "postgres"
  k8s:postgresDb: "app"
  k8s:postgresPassword:
    secure: "<run: pulumi config set --secret k8s:postgresPassword yourpassword --stack baremetal>"

  # ── Redis ─────────────────────────────────────────────────────────────────
  k8s:redisPassword:
    secure: "<run: pulumi config set --secret k8s:redisPassword yourpassword --stack baremetal>"

  # ── MinIO ─────────────────────────────────────────────────────────────────
  k8s:minioRootUser: "minioadmin"
  k8s:minioBucket: "app"
  k8s:minioRootPassword:
    secure: "<run: pulumi config set --secret k8s:minioRootPassword yourpassword --stack baremetal>"